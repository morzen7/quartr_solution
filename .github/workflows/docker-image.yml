name: Docker Image CI
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: docker/setup-buildx-action@v4
    - name: Build the Docker image
      run: docker build -f Dockerfile -t my-sec-project .
